controller_manager:
  ros__parameters:
    update_rate: 1000  # <--- THE 1 kHz HARDWARE HEARTBEAT

    # 1. The Broadcaster: Reads the C++ memory and publishes to ROS
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 2. The Command Controller: Listens to Python and writes to C++ memory
    rl_forward_command_controller:
      type: forward_command_controller/ForwardCommandController

# -----------------------------------------------------------
# Controller Configurations
# -----------------------------------------------------------

joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint_0
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
      - joint_8
      - joint_9
    # Tell the broadcaster to fetch our custom SEA state interface
    interfaces:
      - after_spring_angle

rl_forward_command_controller:
  ros__parameters:
    joints:
      - joint_0
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
      - joint_8
      - joint_9
    # Tell the controller to push data into our custom SEA command interface
    interface_name: target_actuator_angle